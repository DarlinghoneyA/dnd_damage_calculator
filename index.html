<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>dnd damage calculation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="container flex-grow-1 py-4 min-vh-100">
    <!-- Navigation bar -->
    <div class="container sticky-top divnav">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-pill px-4">
            <div class="container-fluid">
                <!-- logo icon -->
                <img src="/assets/logo.png" class="logo-image" alt="logo">
                <!-- Navbar Toggler -->
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarDropdown">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarDropdown">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item px-2">
                            <a href="#" class="nav-link">Home</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <!-- Navbar End -->
    <div class="container d-flex justify-content-center align-items-center px-5 py-5">
        <p style="font-size: 100px;">DND Damage calculation</p>
    </div>
    <div class="mb-3 d-flex justify-content-evenly">
        <div>
            <label for="numberInput" class="form-label">กรุณาใส่จำนวณลูกเต๋า (1-100)</label>
            <input 
                type="number" 
                class="form-control" 
                id="numberInput" 
                min="1" 
                max="100" 
                placeholder="1-100"
                required>
        </div>
        <div>
            <label for="Dice-type" class="form-label">เลือกประเภทลูกเต๋า</label>
            <select class="form-select" id="Dice-type" aria-label="Dice-type Select">
            <option selected>Open this select menu</option>
            <option value="1">D4</option>
            <option value="2">D6</option>
            <option value="3">D8</option>
            <option value="4">D10</option>
            <option value="5">D12</option>
            <option value="6">D20</option>
            </select>
        </div>
        <div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="abilities[]" value="GWF" id="checkGreatWeapon">
                <label class="form-check-label" for="checkDefault">
                    Great Weapon Fighting
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="abilities[]" value="SA" id="checkSavage">
                <label class="form-check-label" for="checkDefault">
                    Savage Attacker
                </label>
            </div>
        </div>
        <button type="button" class="btn btn-primary">calculation</button>
        
        
    </div>
    <!-- bootstap javascript -->
     <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
