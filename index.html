<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>D&D Damage Calculation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4 min-vh-100">
    <div class="container d-flex justify-content-center align-items-center py-5">
        <h1 class="display-3 text-center fw-bold">DND Damage Calculation</h1>
    </div>

    <form class="needs-validation" novalidate>
        <div class="container">
            <div class="row mb-4 justify-content-center">
                <div class="col-md-8 card p-3 shadow-sm no-validate">
                    <h5 class="card-title border-bottom pb-2 mb-3">Character Abilities (Global)</h5>
                    <div class="d-flex flex-wrap gap-4 justify-content-center">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="checkSavage">
                            <label class="form-check-label fw-bold" for="checkSavage">Savage Attacker</label>
                            <div class="small text-muted">ทอย 2 ชุด เลือกชุดที่สูงกว่า</div>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="checkGreatWeapon">
                            <label class="form-check-label fw-bold" for="checkGreatWeapon">Great Weapon Fighting</label>
                            <div class="small text-muted">ทอยใหม่หากได้ 1 หรือ 2 (ทอยซ้ำครั้งเดียว)</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="diceRows">
                <div class="row w-100 align-items-end mb-3 dice-entry-row">
                    <div class="col-lg-3 col-md-6 col-sm-12 mb-3">
                        <label class="form-label">จำนวนลูกเต๋า (1-100)</label>
                        <input type="number" class="form-control dice-count" min="1" max="100" placeholder="1-100" required>
                        <div class="invalid-feedback">โปรดระบุจำนวนลูกเต๋า</div>
                    </div>
                    <div class="col-lg-3 col-md-6 col-sm-12 mb-3">
                        <label class="form-label">เลือกประเภทลูกเต๋า</label>
                        <select class="form-select dice-type" required>
                            <option selected disabled value="">เลือกประเภทลูกเต๋า</option>
                            <option value="4">D4</option>
                            <option value="6">D6</option>
                            <option value="8">D8</option>
                            <option value="10">D10</option>
                            <option value="12">D12</option>
                            <option value="20">D20</option>
                        </select>
                        <div class="invalid-feedback">โปรดเลือกชนิดของลูกเต๋า</div>
                    </div>
                    <div class="col-lg-3 col-md-6 col-sm-12 mb-3">
                        <label class="form-label">Additional Damage</label>
                        <input class="form-control additional-damage" type="text" placeholder="(-1,1,2)">
                    </div>
                    <div class="col-lg-3 col-md-6 col-sm-12 mb-3">
                        <label class="form-label">Damage Type</label>
                        <input class="form-control damage-type" type="text" placeholder="(Optional)">
                    </div>
                </div>
            </div>

            <div id="addRowBtn" class="col-lg-12 col-md-12 col-sm-12 mb-4 d-flex justify-content-center" style="cursor: pointer;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-plus-circle-fill text-primary" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z"/>
                </svg>
            </div>

            <div class="col-lg-12 col-md-12 col-sm-12 mb-3 d-flex justify-content-center">
                <button type="button" id="calcBtn" class="btn btn-primary btn-lg px-5 shadow">Calculate Damage</button>
            </div>
        </div>
    </form>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
